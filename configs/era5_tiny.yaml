seed: 42
device: "cpu"
output_dir: "outputs_era5_tiny"

dataset:
  kind: "era5_nc"
  npz_path: "data/sample/synthetic_weather.npz"
  train_ratio: 0.7
  val_ratio: 0.15
  era5:
    path: "data/era5/era5_tiny_subset.nc"
    variables: ["t2m", "sp", "u10", "v10", "tp"]
    time_dim: "time"
    lat_dim: "latitude"
    lon_dim: "longitude"
    level: null

data:
  input_steps: 8
  forecast_steps: 4
  batch_size: 4
  num_workers: 0

model:
  auto_shape: true
  channels: 5
  height: 16
  width: 16
  patch_size: 2
  hidden_dim: 64
  emb_dim: 64
  num_heads: 4
  num_layers: 2
  dropout: 0.1

train:
  epochs: 6
  learning_rate: 0.001
  weight_decay: 0.0001

inference:
  mc_samples: 10
